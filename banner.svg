<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Wrench icon (text-based) -->
  <text x="640" y="190" text-anchor="middle" font-size="96" font-family="Arial,Helvetica,sans-serif" fill="#3fb950">&#x1F6E0;</text>
  
  <!-- Title -->
  <text x="640" y="300" text-anchor="middle" font-size="60" font-weight="bold" font-family="Arial,Helvetica,sans-serif" fill="#ffffff">
    Codex Plugin Fix
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="360" text-anchor="middle" font-size="28" font-family="Arial,Helvetica,sans-serif" fill="#8b949e">
    One-click repair toolkit for Codex Desktop
  </text>
  
  <!-- Feature badges - using text only, no emoji -->
  <g transform="translate(200, 430)">
    <rect x="0" y="0" width="200" height="44" rx="8" fill="#238636" opacity="0.25"/>
    <text x="100" y="29" text-anchor="middle" font-size="17" font-family="Arial,Helvetica,sans-serif" fill="#3fb950">Post-Update Fix</text>
    
    <rect x="220" y="0" width="200" height="44" rx="8" fill="#1f6feb" opacity="0.25"/>
    <text x="320" y="29" text-anchor="middle" font-size="17" font-family="Arial,Helvetica,sans-serif" fill="#58a6ff">Chrome Setup</text>
    
    <rect x="440" y="0" width="200" height="44" rx="8" fill="#d29922" opacity="0.25"/>
    <text x="540" y="29" text-anchor="middle" font-size="17" font-family="Arial,Helvetica,sans-serif" fill="#d29922">Backup &amp; Restore</text>
    
    <rect x="660" y="0" width="220" height="44" rx="8" fill="#f78166" opacity="0.25"/>
    <text x="770" y="29" text-anchor="middle" font-size="17" font-family="Arial,Helvetica,sans-serif" fill="#f78166">API Provider Switch</text>
  </g>
  
  <!-- Bottom -->
  <text x="640" y="610" text-anchor="middle" font-size="22" font-family="Arial,Helvetica,sans-serif" fill="#484f58">
    github.com/ZYY374/codex-plugin-fix
  </text>
</svg>
