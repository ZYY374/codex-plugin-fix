<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Decorative lines -->
  <rect x="0" y="0" width="1280" height="4" fill="#3fb950"/>
  
  <!-- Wrench shape made from rectangles -->
  <g transform="translate(590, 120)">
    <rect x="38" y="0" width="24" height="70" rx="6" fill="#3fb950"/>
    <rect x="20" y="50" width="60" height="40" rx="10" fill="#3fb950" opacity="0.7"/>
    <rect x="10" y="70" width="16" height="16" rx="8" fill="#3fb950" opacity="0.5"/>
    <rect x="74" y="70" width="16" height="16" rx="8" fill="#3fb950" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="640" y="320" text-anchor="middle" font-size="64" font-weight="bold" font-family="Arial" fill="#ffffff">Codex Plugin Fix</text>
  
  <!-- Subtitle -->
  <text x="640" y="380" text-anchor="middle" font-size="28" font-family="Arial" fill="#8b949e">One-click repair toolkit for Codex Desktop</text>
  
  <!-- Badges -->
  <g transform="translate(140, 450)">
    <rect x="0" y="0" width="210" height="44" rx="6" fill="#238636" opacity="0.3"/>
    <text x="105" y="29" text-anchor="middle" font-size="17" font-family="Arial" fill="#3fb950">Post-Update Fix</text>
    
    <rect x="225" y="0" width="210" height="44" rx="6" fill="#1f6feb" opacity="0.3"/>
    <text x="330" y="29" text-anchor="middle" font-size="17" font-family="Arial" fill="#58a6ff">Chrome Setup</text>
    
    <rect x="450" y="0" width="240" height="44" rx="6" fill="#d29922" opacity="0.3"/>
    <text x="570" y="29" text-anchor="middle" font-size="17" font-family="Arial" fill="#d29922">Backup and Restore</text>
    
    <rect x="705" y="0" width="225" height="44" rx="6" fill="#f78166" opacity="0.3"/>
    <text x="817" y="29" text-anchor="middle" font-size="17" font-family="Arial" fill="#f78166">API Provider Switch</text>
  </g>
  
  <text x="640" y="610" text-anchor="middle" font-size="22" font-family="Arial" fill="#484f58">github.com/ZYY374/codex-plugin-fix</text>
</svg>
